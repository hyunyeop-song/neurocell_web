<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>NeuroCall 실시간 관제 - {{ patient.name }}</title>
    <style>
        body { font-family: 'Helvetica', sans-serif; background-color: #11111b; color: #cdd6f4; margin: 0; padding: 20px; }
        .dashboard { display: flex; max-width: 1200px; margin: 0 auto; gap: 20px; }
        .video-section { flex: 1.5; background: #1e1e2e; padding: 20px; border-radius: 15px; text-align: center; }
        .control-section { flex: 1; background: #1e1e2e; padding: 20px; border-radius: 15px; }
        .video-stream { width: 100%; max-height: 480px; border-radius: 10px; }
        .info-card, .ai-card { background: #252538; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .progress-container { margin: 15px 0; }
        .progress-bar { background: #313244; border-radius: 10px; height: 20px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; transition: width 0.5s ease; }
        .btn-back { display: inline-block; padding: 10px 20px; background: #313244; color: white; text-decoration: none; border-radius: 5px; margin-bottom: 15px; }

        /* 🚨 [신규 추가] 실시간 비상 알림 팝업 모달 스타일 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }
        .modal-box {
            background: #1e1e2e;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 500px;
            width: 80%;
            box-shadow: 0 0 30px rgba(243, 139, 168, 0.5);
            animation: blink 1s infinite alternate;
        }
        @keyframes blink {
            from { border: 4px solid #f38ba8; }
            to { border: 4px solid #f9e2af; }
        }
        .modal-title { font-size: 28px; font-weight: bold; margin-bottom: 15px; }
        .modal-desc { font-size: 20px; margin-bottom: 25px; color: #ffffff; }
        .btn-confirm {
            background-color: #a6e3a1; color: #11111b;
            padding: 15px 30px; font-size: 18px; font-weight: bold;
            border: none; border-radius: 10px; cursor: pointer;
        }
        .btn-confirm:hover { background-color: #94e2d5; }
    </style>
</head>
<body>
    <a href="/" class="btn-back">⬅️ 중앙 목록으로 돌아가기</a>
    <div class="dashboard">
        <div class="video-section">
            <h2>🎥 실시간 안구 생체 신호 스트리밍</h2>
            <img class="video-stream" src="{{ url_for('video_feed', patient_id=patient.id) }}">
        </div>
        <div class="control-section">
            <div class="info-card">
                <h2>🩺 환자 관제 카드</h2>
                <p><strong>병실:</strong> {{ patient.room }}</p>
                <p><strong>성명:</strong> {{ patient.name }} ({{ patient.age }}세)</p>
                <p><strong>진단명:</strong> <span style="color:#f38ba8;">{{ patient.diagnosis }}</span></p>
            </div>
            <div class="ai-card">
                <h3 style="color:#f9e2af;">📊 AI AX 선제 간호 예측 (향후 1시간)</h3>
                <div class="progress-container">
                    <p>통증 발생 확률: <span id="pain-text">0%</span></p>
                    <div class="progress-bar"><div id="pain-bar" class="progress-fill" style="background:#fab387;"></div></div>
                </div>
                <div class="progress-container">
                    <p>체위 변경 요청 확률: <span id="pos-text">0%</span></p>
                    <div class="progress-bar"><div id="pos-bar" class="progress-fill" style="background:#89b4fa;"></div></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 🚨 [신규 추가] 실시간 비상 호출 알림 모달 창 -->
    <div id="alertModal" class="modal-overlay">
        <div class="modal-box">
            <div id="alertTitle" class="modal-title" style="color: #f38ba8;">🚨 비상 호출 발생!</div>
            <div id="alertDesc" class="modal-desc">환자 상태 확인이 필요합니다.</div>
            <button class="btn-confirm" onclick="confirmAlert()">의료진 응대 확인 완료</button>
        </div>
    </div>

    <script>
        // 비상 호출음 재생용 오디오 객체 생성
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playBeep() {
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = "sine";
                osc.frequency.value = 880; // A5 음높이
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            } catch(e){}
        }

        function updatePredictions() {
            fetch('/get_predictions/{{ patient.id }}')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('pain-text').innerText = data.Pain + '%';
                    document.getElementById('pain-bar').style.width = data.Pain + '%';
                    document.getElementById('pos-text').innerText = data.Position + '%';
                    document.getElementById('pos-bar').style.width = data.Position + '%';
                });
        }

        // 🚨 1초마다 실시간 비상 알림 발생 여부 체크
        function checkAlerts() {
            fetch('/get_alert/{{ patient.id }}')
                .then(response => response.json())
                .then(data => {
                    if (data.active) {
                        const modal = document.getElementById('alertModal');
                        const title = document.getElementById('alertTitle');
                        const desc = document.getElementById('alertDesc');

                        if (data.event === "1st_Suction") {
                            title.innerText = "🔴 1순위 긴급: Suction (가래 흡인)";
                            title.style.color = "#f38ba8";
                            desc.innerText = `[${data.time}] 환자분께서 속사 깜빡임 신호를 보냈습니다! 즉시 가래 흡인이 필요합니다.`;
                        } else if (data.event === "2nd_Pain") {
                            title.innerText = "🟠 2순위 경고: 통증 (Pain) 발생";
                            title.style.color = "#fab387";
                            desc.innerText = `[${data.time}] 환자분께서 우안 감기 신호를 보냈습니다! 통증 상태를 점검하세요.`;
                        } else if (data.event === "3rd_Position") {
                            title.innerText = "🔵 3순위 일반: 체위 변경 (Position)";
                            title.style.color = "#89b4fa";
                            desc.innerText = `[${data.time}] 환자분께서 좌안 감기 신호를 보냈습니다! 체위 변경이 필요합니다.`;
                        }

                        modal.style.display = "flex";
                        playBeep(); // 경보음 발생
                    }
                });
        }

        function confirmAlert() {
            fetch('/clear_alert/{{ patient.id }}', { method: 'POST' })
                .then(() => {
                    document.getElementById('alertModal').style.display = "none";
                });
        }

        setInterval(updatePredictions, 3000);
        setInterval(checkAlerts, 1000); // 1초 주기로 비상 알림 감지
        updatePredictions();
    </script>
</body>
</html>
